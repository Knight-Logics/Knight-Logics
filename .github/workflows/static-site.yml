name: Static site integrity

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Verify sitemap generator is idempotent
        run: |
          node scripts/sync-sitemap.js
          git diff --exit-code -- sitemap.xml
      - run: python scripts/validate-static-site.py
