  <text x="130" y="500" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600">Brunch &amp; mimosa specials</text>

  <rect x="110" y="530" width="440" height="72" rx="8" fill="#1a2f4d"/>
  <text x="130" y="560" fill="#fbbf24" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700">SUN 6 PM</text>
