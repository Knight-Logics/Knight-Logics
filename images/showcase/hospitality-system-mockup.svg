  <text x="650" y="342" fill="#f1f5f9" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="600">Chef specials</text>

  <line x1="650" y1="358" x2="1090" y2="358" stroke="#1e3a5f" stroke-width="1"/>
  <text x="650" y="388" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="15">Blackened grouper tacos</text>
  <text x="1090" y="388" text-anchor="end" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="15">$16</text>
  <text x="650" y="428" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="15">Smoked wings (12 pc)</text>
  <text x="1090" y="428" text-anchor="end" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="15">$14</text>
  <text x="650" y="468" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="15">Craft burger + fries</text>
  <text x="1090" y="468" text-anchor="end" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="15">$15</text>
  <text x="650" y="508" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="15">House old fashioned</text>
  <text x="1090" y="508" text-anchor="end" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="15">$11</text>

  <rect x="650" y="548" width="200" height="36" rx="6" fill="#1e3a5f"/>
  <text x="750" y="571" text-anchor="middle" fill="#7dd3fc" font-family="Segoe UI, system-ui, sans-serif" font-size="13">Admin: edit specials</text>

  <text x="600" y="720" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Fictional UI mockup - events, menus &amp; ordering capability</text>
