<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Illustration of a restaurant and bar website with events, menu specials, and order-ahead">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#08111f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="654" rx="20" fill="#0f1d33" stroke="#1e3a5f" stroke-width="2" filter="url(#shadow)"/>

  <rect x="48" y="48" width="1104" height="44" rx="20" fill="#13243d"/>
  <rect x="48" y="72" width="1104" height="20" fill="#13243d"/>
  <circle cx="84" cy="70" r="7" fill="#ef4444"/>
  <circle cx="108" cy="70" r="7" fill="#f59e0b"/>
  <circle cx="132" cy="70" r="7" fill="#22c55e"/>
  <rect x="420" y="58" width="360" height="24" rx="12" fill="#1a2f4d"/>
  <text x="600" y="75" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="12">yourbar.com</text>

  <rect x="80" y="108" width="1040" height="140" rx="12" fill="#152a45"/>
