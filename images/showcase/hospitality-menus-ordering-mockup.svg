  <text x="1102" y="410" text-anchor="end" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="14">$30.00</text>
  <text x="850" y="438" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="14">Tax</text>
  <text x="1102" y="438" text-anchor="end" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="14">$2.10</text>
  <text x="850" y="472" fill="#f1f5f9" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600">Total</text>
  <text x="1102" y="472" text-anchor="end" fill="#fbbf24" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700">$32.10</text>

  <rect x="850" y="500" width="272" height="48" rx="24" fill="url(#accent)"/>
  <text x="986" y="530" text-anchor="middle" fill="#08111f" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700">Checkout with Stripe</text>
  <text x="986" y="580" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Owned-domain ordering</text>

  <text x="600" y="720" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Sample menu &amp; ordering UI - fictional venue</text>
