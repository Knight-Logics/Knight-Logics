  <text x="870" y="232" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="14">Grouper tacos x1</text>
  <text x="1102" y="232" text-anchor="end" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="14">$16</text>
  <text x="870" y="254" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Pickup in 20-25 min</text>

  <rect x="850" y="284" width="272" height="64" rx="8" fill="#1a2f4d"/>
  <text x="870" y="312" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="14">Wings x1</text>
  <text x="1102" y="312" text-anchor="end" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="14">$14</text>

