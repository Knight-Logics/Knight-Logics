  <rect x="80" y="268" width="500" height="380" rx="12" fill="#122238" stroke="#1e3a5f" stroke-width="1"/>
  <text x="110" y="308" fill="#38bdf8" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">THIS WEEK</text>
  <text x="110" y="342" fill="#f1f5f9" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="600">Live music &amp; events</text>

  <rect x="110" y="362" width="440" height="72" rx="8" fill="#1a2f4d"/>
