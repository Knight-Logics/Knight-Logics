name: Secret scan

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install pinned Gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" -C /tmp gitleaks

      - name: Select changed commit range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "value=origin/${{ github.base_ref }}...HEAD" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            echo "value=${{ github.sha }}^!" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${{ github.event.before }}..${{ github.sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Scan new commits
        shell: bash
        run: |
          /tmp/gitleaks git . \
            --config .gitleaks.toml \
            --log-opts="${{ steps.range.outputs.value }}" \
            --redact=100 \
            --no-banner \
            --no-color
